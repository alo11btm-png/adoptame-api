spring.application.name=adoptame-api
# Puerto del servidor web
server.address=0.0.0.0
server.port=8181

# Thymeleaf
spring.thymeleaf.cache=false

# MySQL
# Evitar la estrategia de conversi¯n de nombres
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# NO usar update: Hibernate alteraria ENUM y VARCHAR de tu script SQL
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none

# Jackson 3 (Spring Boot 4): las fechas ya salen en ISO-8601 por defecto.
# No uses spring.jackson.serialization.write-dates-as-timestamps (solo Jackson 2).
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/adopciones_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Show MySQL
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

#Multipart
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
#Login
# spring.security.enabled=false no desactiva Security en Spring Boot 4; ver build.gradle (dependencia comentada como MiAndroid)
# spring.security.user.name=admin
# spring.security.user.password=admin
